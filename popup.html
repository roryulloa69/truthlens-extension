<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthLens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 200px;
      background: #0f0f1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; }
    .content { padding: 16px; }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 6px;
      background: none;
      border: none;
      color: #888;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .tab.active { background: #6366f1; color: #fff; }
    textarea {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      font-size: 13px;
      resize: none;
      outline: none;
    }
    textarea:focus { border-color: #6366f1; }
    .analyze-btn {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }
    .analyze-btn:hover { background: #5558e3; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 14px;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      display: none;
    }
    .score-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .score-bar { background: #333; border-radius: 4px; height: 8px; margin-bottom: 4px; }
    .score-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .score-value { font-size: 20px; font-weight: 700; }
    .verdict { font-size: 12px; color: #aaa; margin-top: 6px; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a { color: #6366f1; font-size: 11px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>TruthLens</h1>
      <p>AI &amp; Deepfake Detector</p>
    </div>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="tab active" data-type="text">Text</button>
      <button class="tab" data-type="image">Image URL</button>
      <button class="tab" data-type="url">Web URL</button>
    </div>
    <textarea id="input" rows="4" placeholder="Paste text, image URL, or web URL to analyze..."></textarea>
    <button class="analyze-btn" id="analyzeBtn">Analyze</button>
    <div class="result" id="result">
      <div class="score-label">AI / Fake Probability</div>
      <div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
      <div class="score-value" id="scoreValue">--</div>
      <div class="verdict" id="verdict"></div>
    </div>
  </div>
  <div class="footer">
    <span style="color:#555;font-size:11px">v1.0.0</span>
    <a href="https://truthlens-landing.vercel.app" target="_blank">truthlens.app</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
