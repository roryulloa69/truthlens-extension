name: Build Extension ZIP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create extension ZIP
        run: |
          zip -r truthlens-extension.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: truthlens-extension
          path: truthlens-extension.zip
          retention-days: 30
